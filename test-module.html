<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模块加载测试</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #000;
            color: #0f0;
        }
        .success { color: #0f0; }
        .error { color: #f00; }
        .info { color: #0ff; }
    </style>
</head>
<body>
    <h1>🧪 模块加载测试</h1>
    <div id="results"></div>

    <script type="module">
        const results = document.getElementById('results');
        const tests = [];
        
        async function testImport(path, name) {
            try {
                await import(path);
                tests.push({ name, status: 'success', msg: '✅ 加载成功' });
            } catch (error) {
                tests.push({ name, status: 'error', msg: `❌ 失败: ${error.message}` });
            }
        }
        
        async function runTests() {
            results.innerHTML = '<p class="info">正在测试模块加载...</p>';
            
            await testImport('./js/config/GameConfig.js', 'GameConfig');
            await testImport('./js/core/SaveManager.js', 'SaveManager');
            await testImport('./js/core/GameState.js', 'GameState');
            await testImport('./js/main.js', 'main.js (入口文件)');
            
            let html = '<h2>测试结果：</h2>';
            tests.forEach(test => {
                const className = test.status === 'success' ? 'success' : 'error';
                html += `<p class="${className}">${test.name}: ${test.msg}</p>`;
            });
            
            if (tests.every(t => t.status === 'success')) {
                html += '<p class="success">🎉 所有模块加载成功！游戏应该可以正常运行。</p>';
            } else {
                html += '<p class="error">⚠️ 部分模块加载失败，请检查错误信息。</p>';
            }
            
            results.innerHTML = html;
        }
        
        runTests();
    </script>
</body>
</html>
